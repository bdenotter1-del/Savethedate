<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billy & Danique – Save the Date</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────
   KASTEEL KLEURENPALET (pastel mozaïek)
   Mintgroen #a8d4b8 · Zacht roze #e8a8b8
   Lavendel #c0a8d8 · Perzik #f0c8a0
   Goud/okker #c8a040 · Diepblauw #6080a8
   Crème wit #faf6f0
───────────────────────────────────────────── */
:root {
  --mint:   #a8d4b8;
  --rose:   #e8a8b8;
  --lav:    #c0a8d8;
  --peach:  #f0c8a0;
  --gold:   #c8a040;
  --navy:   #6080a8;
  --deep:   #3a2040;
  --cream:  #faf6f0;
  --blush:  #fdf4f7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:var(--cream);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;
  overflow:hidden;min-height:100vh;
}

/* ── INTRO ── */
#intro{text-align:center;padding:2.5rem 2rem;animation:fadeUp 1.2s ease both;}
#intro h1{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(1.5rem,5vw,2.6rem);
  color:var(--deep);line-height:1.35;margin-bottom:1rem;
}
#intro p{color:#b06880;font-style:italic;font-size:1.1rem;margin-bottom:2.5rem;letter-spacing:.05em;}

/* ── BUTTON ── */
.btn{
  display:inline-block;background:none;
  border:1.5px solid #b06880;color:#b06880;
  font-family:'Libre Baskerville',serif;
  font-size:.75rem;letter-spacing:.22em;text-transform:uppercase;
  padding:.85rem 2.4rem;cursor:pointer;
  position:relative;overflow:hidden;transition:color .35s;
  text-decoration:none;
}
.btn::before{
  content:'';position:absolute;inset:0;background:#b06880;
  transform:scaleX(0);transform-origin:left;transition:transform .35s ease;z-index:0;
}
.btn span{position:relative;z-index:1;}
.btn:hover{color:#fff;}
.btn:hover::before{transform:scaleX(1);}

/* ── PUZZLE ── */
#puzzle-screen{display:none;flex-direction:column;align-items:center;gap:.9rem;padding:1rem;animation:fadeUp .7s ease both;}
#puzzle-title{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.8rem,2.2vw,1rem);
  color:#b06880;letter-spacing:.1em;opacity:.85;
}
#puzzle-frame{
  position:relative;
  padding:10px;
  background:linear-gradient(135deg,var(--rose),var(--peach),var(--mint),var(--navy)40%,var(--lav));
  box-shadow:0 0 0 2px #a07050,0 0 0 4px var(--gold),0 0 0 6px #a07050,0 0 35px rgba(192,160,64,.2);
}
#puzzle-canvas{display:block;touch-action:none;cursor:grab;}
#puzzle-canvas:active{cursor:grabbing;}

/* Sparkle canvas overlay */
#sparkle-canvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;opacity:0;
  transition:opacity .3s;
}
#sparkle-canvas.active{opacity:1;}

#progress-wrap{display:flex;align-items:center;gap:.8rem;width:min(480px,90vw);}
#progress-bar-bg{flex:1;height:3px;background:rgba(192,160,64,.15);border-radius:2px;overflow:hidden;}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--rose),var(--gold));border-radius:2px;transition:width .3s ease;}
#progress-text{font-style:italic;color:#b06880;opacity:.5;font-size:.85rem;min-width:3.5rem;text-align:right;}
#hint{color:#b06880;opacity:.4;font-style:italic;font-size:.9rem;letter-spacing:.04em;}

/* ── COMPLETE OVERLAY ── */
#complete-overlay{
  display:none;position:fixed;inset:0;
  background:var(--blush);
  flex-direction:column;align-items:center;justify-content:center;
  z-index:100;text-align:center;padding:2rem 1.5rem;
  overflow:hidden;
}

/* Corner decorations */
.corner{
  position:absolute;
  width:clamp(160px,30vw,240px);
  height:clamp(160px,30vw,240px);
  pointer-events:none;
  overflow:visible;
}
.corner-tl{top:-8px;left:-8px;}
.corner-tr{top:-8px;right:-8px;transform:scaleX(-1);}
.corner-bl{bottom:-8px;left:-8px;transform:scaleY(-1);}
.corner-br{bottom:-8px;right:-8px;transform:scale(-1,-1);}

/* Card */
.card-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  max-width:480px;width:100%;
}
.reveal-date{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(.7rem,1.8vw,.85rem);
  letter-spacing:.38em;color:var(--deep);
  margin-bottom:1.1rem;
  animation:slideIn .6s .1s ease both;
}
.wreath-wrap{
  width:clamp(195px,48vw,275px);
  height:clamp(195px,48vw,275px);
  position:relative;margin-bottom:1rem;
  animation:scaleIn .8s .2s ease both;
}
.wreath-wrap svg{width:100%;height:100%;overflow:visible;}
.monogram{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,5vw,2.2rem);
  color:var(--deep);letter-spacing:.1em;
}
.reveal-names{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(1rem,3.5vw,1.55rem);
  letter-spacing:.3em;color:var(--deep);
  margin-bottom:.4rem;
  animation:slideIn .6s .35s ease both;
}
.reveal-sub{
  font-family:'Libre Baskerville',serif;
  font-size:clamp(.6rem,1.6vw,.75rem);
  letter-spacing:.32em;color:#b06880;
  margin-bottom:1.6rem;
  animation:slideIn .6s .48s ease both;
}
.btn-agenda{animation:slideIn .6s .6s ease both;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
</style>
</head>

const COLS=4,ROWS=4,TOTAL=COLS*ROWS,SNAP=32;
let canvas,ctx,CW,CH,TW,TH,source,img;
let sparkleCanvas,sCtx;
let pieces=[],drag=null,solved=0,dirty=true;
let sparkles=[],sparkleActive=false,sparkleStart=0;
const SPARKLE_DURATION=2800; // ms sparkle tonen
const TRANSITION_DELAY=3400; // ms totaal voor overgang

// ── INIT ──────────────────────────────────────
function startPuzzle(){
  document.getElementById('intro').style.display='none';
  document.getElementById('puzzle-screen').style.display='flex';
  canvas=document.getElementById('puzzle-canvas');
  sparkleCanvas=document.getElementById('sparkle-canvas');
  ctx=canvas.getContext('2d');
  sCtx=sparkleCanvas.getContext('2d');

  img=new Image();
  img.onload=()=>{
    const maxSize=Math.min(460,window.innerWidth-64);
    const ratio=img.naturalHeight/img.naturalWidth;
    CW=Math.floor(maxSize/COLS)*COLS;
    CH=Math.floor(CW*ratio/ROWS)*ROWS;
    TW=CW/COLS; TH=CH/ROWS;
    canvas.width=CW; canvas.height=CH;
    sparkleCanvas.width=CW; sparkleCanvas.height=CH;
    sparkleCanvas.style.width=canvas.offsetWidth+'px';
    sparkleCanvas.style.height=canvas.offsetHeight+'px';

    source=document.createElement('canvas');
    source.width=CW; source.height=CH;
    source.getContext('2d').drawImage(img,0,0,CW,CH);

    pieces=[];
    for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++)
      pieces.push({col:c,row:r,tx:c*TW,ty:r*TH,x:Math.random()*(CW-TW),y:Math.random()*(CH-TH),snapped:false});

    canvas.addEventListener('pointerdown',onDown);
    canvas.addEventListener('pointermove',onMove);
    canvas.addEventListener('pointerup',onUp);
    canvas.addEventListener('pointercancel',onUp);
    requestAnimationFrame(renderLoop);
  };
  img.src=CARTOON_SRC;
}

// ── RENDER LOOP ───────────────────────────────
function renderLoop(ts){
  if(dirty){dirty=false;render();}
  if(sparkleActive) updateSparkles(ts);
  requestAnimationFrame(renderLoop);
}

function render(){
  ctx.fillStyle='#f5eef2'; ctx.fillRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(192,160,64,.08)'; ctx.lineWidth=1;
  for(let c=0;c<=COLS;c++){ctx.beginPath();ctx.moveTo(c*TW,0);ctx.lineTo(c*TW,CH);ctx.stroke();}
  for(let r=0;r<=ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*TH);ctx.lineTo(CW,r*TH);ctx.stroke();}
  pieces.forEach(p=>{
    if(!p.snapped){ctx.strokeStyle='rgba(192,160,64,.12)';ctx.lineWidth=1;ctx.strokeRect(p.tx+.5,p.ty+.5,TW-1,TH-1);}
  });
  const active=drag?drag.piece:null;
  pieces.filter(p=>p.snapped).forEach(drawPiece);
  pieces.filter(p=>!p.snapped&&p!==active).forEach(drawPiece);
  if(active){
    ctx.save();ctx.shadowColor='rgba(60,32,64,.45)';ctx.shadowBlur=20;ctx.shadowOffsetX=4;ctx.shadowOffsetY=6;
    drawPiece(active);ctx.restore();
  }
}

function drawPiece(p){
  ctx.save();
  ctx.beginPath();ctx.rect(p.x,p.y,TW,TH);ctx.clip();
  ctx.drawImage(source,p.col*TW,p.row*TH,TW,TH,p.x,p.y,TW,TH);
  ctx.strokeStyle=p.snapped?'rgba(200,160,64,.6)':'rgba(160,120,140,.4)';
  ctx.lineWidth=p.snapped?2:1.2;
  ctx.strokeRect(p.x+.5,p.y+.5,TW-1,TH-1);
  ctx.restore();
}

// ── SPARKLES ─────────────────────────────────
const SPARKLE_COLORS=['#f0d040','#e8a0b8','#a8d4b8','#c0a8d8','#f0c8a0','#a0c0e8','#ffffff'];

function spawnSparkles(){
  sparkles=[];
  // Spawn veel sparkles verspreid over het canvas
  for(let i=0;i<120;i++){
    sparkles.push({
      x: Math.random()*CW,
      y: Math.random()*CH,
      r: 1.5+Math.random()*4,
      vx:(Math.random()-.5)*1.2,
      vy:(Math.random()-.5)*1.2-0.5,
      color:SPARKLE_COLORS[Math.floor(Math.random()*SPARKLE_COLORS.length)],
      life:Math.random(),  // 0-1 start offset
      decay:0.004+Math.random()*0.006,
      twinkle:0.05+Math.random()*0.1,
      angle:Math.random()*Math.PI*2,
      spin:(Math.random()-.5)*0.15,
      type:Math.random()<.6?'star':'circle',
    });
  }
  sparkleActive=true;
  sparkleStart=performance.now();
  sparkleCanvas.classList.add('active');
}

function updateSparkles(ts){
  const elapsed=ts-sparkleStart;
  const globalFade=elapsed>SPARKLE_DURATION*.7?1-((elapsed-SPARKLE_DURATION*.7)/(SPARKLE_DURATION*.3)):1;
  sCtx.clearRect(0,0,CW,CH);
  if(elapsed>SPARKLE_DURATION){
    sparkleActive=false;
    sparkleCanvas.classList.remove('active');
    return;
  }
  sparkles.forEach(s=>{
    s.x+=s.vx; s.y+=s.vy;
    s.life+=s.twinkle;
    s.angle+=s.spin;
    const alpha=Math.abs(Math.sin(s.life))*globalFade;
    sCtx.save();
    sCtx.globalAlpha=alpha;
    sCtx.translate(s.x,s.y);
    sCtx.rotate(s.angle);
    if(s.type==='star'){
      drawStar(sCtx,0,0,s.r*1.4,s.r*.55,5,s.color);
    } else {
      sCtx.beginPath();sCtx.arc(0,0,s.r,0,Math.PI*2);
      sCtx.fillStyle=s.color;sCtx.fill();
    }
    // Glans
    sCtx.globalAlpha=alpha*.5;
    sCtx.beginPath();sCtx.arc(0,0,s.r*2.5,0,Math.PI*2);
    const grd=sCtx.createRadialGradient(0,0,0,0,0,s.r*2.5);
    grd.addColorStop(0,s.color);grd.addColorStop(1,'transparent');
    sCtx.fillStyle=grd;sCtx.fill();
    sCtx.restore();
  });
}

function drawStar(c,x,y,r1,r2,pts,color){
  c.beginPath();
  for(let i=0;i<pts*2;i++){
    const r=i%2===0?r1:r2;
    const a=i*Math.PI/pts-Math.PI/2;
    i===0?c.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)):c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
  }
  c.closePath();c.fillStyle=color;c.fill();
}

// ── DRAG ──────────────────────────────────────
function xy(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*(CW/r.width),y:(e.clientY-r.top)*(CH/r.height)};}
function topAt(x,y){for(let i=pieces.length-1;i>=0;i--){const p=pieces[i];if(!p.snapped&&x>=p.x&&x<p.x+TW&&y>=p.y&&y<p.y+TH)return p;}return null;}
function onDown(e){e.preventDefault();const{x,y}=xy(e);const p=topAt(x,y);if(!p)return;canvas.setPointerCapture(e.pointerId);drag={piece:p,ox:x-p.x,oy:y-p.y};pieces.splice(pieces.indexOf(p),1);pieces.push(p);dirty=true;}
function onMove(e){if(!drag)return;e.preventDefault();const{x,y}=xy(e);drag.piece.x=Math.max(0,Math.min(CW-TW,x-drag.ox));drag.piece.y=Math.max(0,Math.min(CH-TH,y-drag.oy));dirty=true;}
function onUp(e){
  if(!drag)return;
  const p=drag.piece;drag=null;
  if(Math.abs(p.x-p.tx)<SNAP&&Math.abs(p.y-p.ty)<SNAP){
    p.x=p.tx;p.y=p.ty;p.snapped=true;solved++;
    updateProgress();
    if(solved===TOTAL){
      dirty=true;
      // Render voltooide afbeelding, dan sparkles, dan overgang
      setTimeout(()=>{
        spawnSparkles();
        setTimeout(showComplete,TRANSITION_DELAY);
      },300);
    }
  }
  dirty=true;
}

function updateProgress(){
  document.getElementById('progress-fill').style.width=(solved/TOTAL*100)+'%';
  document.getElementById('progress-text').textContent=`${solved} / ${TOTAL}`;
}
function showComplete(){document.getElementById('complete-overlay').style.display='flex';}
